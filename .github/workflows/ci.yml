name: syntax-check

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run syntax smoke test
        run: bash tools/smoke_test.sh
      - name: Report hard-coded paths without failing legacy provenance
        run: python tools/audit_hardcoded_paths.py --legacy-mode report
